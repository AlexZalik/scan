<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZALIK Scanner</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>

    <style>
        :root {
            --bg: #000;
            --accent: #3b82f6;
            --success: #10b981;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            background: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, #previewImg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Рамка фокусування та прогрес-бар */
        #scannerOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            pointer-events: none;
        }

        .progress-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            display: none;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--success);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .controls {
            background: #1a1a1a;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            color: white;
            background: #333;
        }

        .btn-main { grid-column: span 2; background: var(--accent); }
        .btn-save { grid-column: span 2; background: var(--success); }
        
        #status {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 0;
        }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="status">Завантаження системи...</div>

<div class="viewport">
    <video id="video" autoplay playsinline></video>
    <div id="scannerOverlay"></div>
    <div class="progress-container" id="pContainer">
        <div id="progressBar"></div>
    </div>
    <img id="previewImg" style="display: none;">
</div>

<div class="controls">
    <button id="captureBtn" class="btn-main" disabled>ЗАФІКСУВАТИ ВРУЧНУ</button>
    <button id="retakeBtn" style="display: none;">ПЕРЕЗНЯТИ</button>
    <button id="filterBtn" disabled>ФІЛЬТР</button>
    <button id="saveBtn" class="btn-save" disabled>ЗБЕРЕГТИ PDF</button>
</div>

<canvas id="canvas"></canvas>
<!-- Маленький канвас для аналізу руху -->
<canvas id="motionCanvas" width="64" height="64"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const motionCanvas = document.getElementById('motionCanvas');
    const previewImg = document.getElementById('previewImg');
    const progressBar = document.getElementById('progressBar');
    const pContainer = document.getElementById('pContainer');
    const status = document.getElementById('status');
    
    let lastFrameData = null;
    let stabilityCounter = 0;
    const STABILITY_THRESHOLD = 15; // Чим менше, тим чутливіше до руху
    const AUTO_CAPTURE_TIME = 20;   // Кількість циклів для автозйомки (~1.5 сек)
    let isScanning = true;

    document.getElementById('opencv-src').onload = () => {
        status.innerText = "Тримайте телефон нерухомо над документом";
        document.getElementById('captureBtn').disabled = false;
        startCamera();
        requestAnimationFrame(analyzeFrame);
    };

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 1280, height: 720 } 
        });
        video.srcObject = stream;
    }

    // Аналіз руху для автозйомки
    function analyzeFrame() {
        if (!isScanning) return;

        const mCtx = motionCanvas.getContext('2d');
        mCtx.drawImage(video, 0, 0, 64, 64);
        const currentFrameData = mCtx.getImageData(0, 0, 64, 64).data;

        if (lastFrameData) {
            let diff = 0;
            for (let i = 0; i < currentFrameData.length; i += 4) {
                diff += Math.abs(currentFrameData[i] - lastFrameData[i]);
            }
            
            const movement = diff / (64 * 64);

            if (movement < STABILITY_THRESHOLD) {
                stabilityCounter++;
                pContainer.style.display = 'block';
                progressBar.style.width = (stabilityCounter / AUTO_CAPTURE_TIME * 100) + '%';
                
                if (stabilityCounter >= AUTO_CAPTURE_TIME) {
                    capture();
                }
            } else {
                stabilityCounter = 0;
                progressBar.style.width = '0%';
            }
        }

        lastFrameData = currentFrameData;
        requestAnimationFrame(analyzeFrame);
    }

    function capture() {
        isScanning = false;
        stabilityCounter = 0;
        pContainer.style.display = 'none';
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        previewImg.src = canvas.toDataURL('image/jpeg');
        previewImg.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('scannerOverlay').style.display = 'none';
        
        document.getElementById('captureBtn').style.display = 'none';
        document.getElementById('retakeBtn').style.display = 'block';
        document.getElementById('filterBtn').disabled = false;
        document.getElementById('saveBtn').disabled = false;
        
        status.innerText = "Знімок зроблено!";
    }

    document.getElementById('captureBtn').onclick = capture;

    document.getElementById('retakeBtn').onclick = () => {
        isScanning = true;
        video.style.display = 'block';
        previewImg.style.display = 'none';
        document.getElementById('scannerOverlay').style.display = 'block';
        document.getElementById('captureBtn').style.display = 'block';
        document.getElementById('retakeBtn').style.display = 'none';
        document.getElementById('filterBtn').disabled = true;
        document.getElementById('saveBtn').disabled = true;
        status.innerText = "Тримайте телефон нерухомо";
        requestAnimationFrame(analyzeFrame);
    };

    document.getElementById('filterBtn').onclick = () => {
        let src = cv.imread(canvas);
        cv.cvtColor(src, src, cv.COLOR_RGBA2GRAY, 0);
        cv.adaptiveThreshold(src, src, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 21, 10);
        cv.imshow(canvas, src);
        previewImg.src = canvas.toDataURL('image/jpeg');
        src.delete();
    };

    document.getElementById('saveBtn').onclick = () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: canvas.width > canvas.height ? 'l' : 'p',
            unit: 'px',
            format: [canvas.width, canvas.height]
        });
        pdf.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, canvas.width, canvas.height);
        pdf.save("scan_ai.pdf");
    };
</script>
</body>
</html>
